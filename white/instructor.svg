<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Instructor portrait">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#25D366"/><stop offset="1" stop-color="#075E54"/>
    </linearGradient>
    <clipPath id="circ"><circle cx="120" cy="120" r="120"/></clipPath>
  </defs>
  <g clip-path="url(#circ)">
    <rect width="240" height="240" fill="url(#bg)"/>
    <circle cx="120" cy="120" r="120" fill="url(#bg)"/>
    <!-- shoulders / shirt -->
    <path d="M30 240c0-44 40-74 90-74s90 30 90 74z" fill="#f4f6f7"/>
    <path d="M30 240c0-44 40-74 90-74s90 30 90 74z" fill="#0b141a" opacity="0"/>
    <!-- collar -->
    <path d="M97 176l23 22 23-22 12 8-18 56h-34l-18-56z" fill="#e9edef"/>
    <!-- neck -->
    <path d="M104 150h32v26c0 9-7 16-16 16s-16-7-16-16z" fill="#e0a385"/>
    <path d="M104 162c8 9 24 9 32 0v-12h-32z" fill="#cf9072"/>
    <!-- head -->
    <ellipse cx="120" cy="112" rx="44" ry="48" fill="#eab38f"/>
    <!-- ears -->
    <circle cx="76" cy="116" r="9" fill="#eab38f"/><circle cx="164" cy="116" r="9" fill="#eab38f"/>
    <!-- hair -->
    <path d="M73 104c-3-34 24-52 47-52s50 18 47 52c-2-14-8-22-8-22-6 8-22 14-39 14s-30-4-39-12c0 0-6 8-8 20z" fill="#3a2a1d"/>
    <!-- eyebrows -->
    <path d="M96 104c6-4 16-4 22 0" stroke="#3a2a1d" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M122 104c6-4 16-4 22 0" stroke="#3a2a1d" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- eyes -->
    <ellipse cx="105" cy="116" rx="5" ry="6" fill="#2b2b2b"/>
    <ellipse cx="135" cy="116" rx="5" ry="6" fill="#2b2b2b"/>
    <circle cx="106.6" cy="114" r="1.6" fill="#fff"/><circle cx="136.6" cy="114" r="1.6" fill="#fff"/>
    <!-- nose -->
    <path d="M120 120c-3 8-6 12-6 14 0 3 4 4 6 4s6-1 6-4c0-2-3-6-6-14z" fill="#d99873"/>
    <!-- smile -->
    <path d="M104 142c8 9 24 9 32 0" stroke="#a85f48" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- light beard -->
    <path d="M90 138c4 14 16 24 30 24s26-10 30-24c-6 9-18 14-30 14s-24-5-30-14z" fill="#3a2a1d" opacity=".22"/>
  </g>
  <circle cx="120" cy="120" r="118" fill="none" stroke="#fff" stroke-width="4"/>
</svg>
